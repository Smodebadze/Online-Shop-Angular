<div class="acontainer">
  <form class="aform" [formGroup]="formInfo" (ngSubmit)="register()">
    <h2>Sign Up</h2>
    <div class="field">
      <label>First Name</label>
      <input type="text" formControlName="firstName" />
    </div>
    <div class="field">
      <label>Last Name</label>
      <input type="text" formControlName="lastName" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" formControlName="password" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" formControlName="email" />
    </div>
    <div class="field">
      <label>Age</label>
      <input type="number" formControlName="age" />
    </div>
    <div class="field">
      <label>Address</label>
      <input type="text" formControlName="address" />
    </div>
    <div class="field">
      <label>Phone</label>
      <input type="text" formControlName="phone" />
    </div>
    <div class="field">
      <label>Gender</label>
      <select formControlName="gender">
        <option value="">Choose Gender</option>
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
        <option value="OTHER">Other</option>
      </select>
    </div>
    <div class="field">
      <label>Zip Code</label>
      <input type="number" formControlName="zipcode" />
    </div>
    <div class="field">
      <label>Avatar URL</label>
      <input type="text" formControlName="avatar"  />
    </div>
    <button type="submit" [disabled]="formInfo.invalid">SIGN UP</button>
  </form>
  <form class="aform lform" [formGroup]="loginForm" (ngSubmit)="login()">
    <h2>Login</h2>
    <p class="message" #sms></p>

    <div class="field">
      <label>Email</label>
      <input type="email" formControlName="email" />
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" formControlName="password" />
    </div>

    <button type="submit">LOGIN</button>
  </form>
</div>
