<div class="navbar">
  <div class="left">
    <h1 routerLink="/">Online Shop</h1>
  </div>

  <button class="bbar" (click)="toggleMenu()">
    <i class="fa-solid fa-bars"></i>
  </button>
  <div class="right" [class.active]="menuOpen">
    <p routerLink="/">products</p>

    <p routerLink="/cart">cart</p>

    @if (!isLoggedIn) {
      <p routerLink="/signup">sign up</p>
    }

    @if (isLoggedIn) {
      <p routerLink="/profile">account</p>
    }
  </div>
</div>
